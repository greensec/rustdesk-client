name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "1.4.6"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
          - target: windows
            os: windows-latest
          - target: macos
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Checkout RustDesk source
        shell: bash
        env:
          RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
        run: |
          set -euo pipefail

          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
          cd rustdesk
          git checkout "$RUSTDESK_REF"
          git submodule update --init --recursive

      - name: Show RustDesk commit
        shell: bash
        run: |
          cd rustdesk
          git rev-parse HEAD
          git submodule status --recursive

      - name: Inject self-hosted config and branding on Linux/macOS
        if: matrix.target != 'windows'
        shell: bash
        env:
          CUSTOM_RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          CUSTOM_RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          CUSTOM_API_SERVER: ${{ secrets.API_SERVER }}
          CUSTOM_PUBLIC_KEY: ${{ secrets.RS_PUB_KEY }}

          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
          CLIENT_IDENTIFIER: ${{ vars.CLIENT_IDENTIFIER }}
          CLIENT_DESCRIPTION: ${{ vars.CLIENT_DESCRIPTION }}
          CLIENT_COMPANY: ${{ vars.CLIENT_COMPANY }}
        run: |
          set -euo pipefail

          python3 scripts/configure_rustdesk.py \
            --source-dir rustdesk \
            --host "$CUSTOM_RENDEZVOUS_SERVER" \
            --relay "$CUSTOM_RELAY_SERVER" \
            --api "$CUSTOM_API_SERVER" \
            --key "$CUSTOM_PUBLIC_KEY" \
            --app-name "$CLIENT_NAME" \
            --app-id "$CLIENT_IDENTIFIER" \
            --description "$CLIENT_DESCRIPTION" \
            --company "$CLIENT_COMPANY" \
            --asset-dir branding

      - name: Inject self-hosted config and branding on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        env:
          CUSTOM_RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          CUSTOM_RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          CUSTOM_API_SERVER: ${{ secrets.API_SERVER }}
          CUSTOM_PUBLIC_KEY: ${{ secrets.RS_PUB_KEY }}

          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
          CLIENT_IDENTIFIER: ${{ vars.CLIENT_IDENTIFIER }}
          CLIENT_DESCRIPTION: ${{ vars.CLIENT_DESCRIPTION }}
          CLIENT_COMPANY: ${{ vars.CLIENT_COMPANY }}
        run: |
          python scripts/configure_rustdesk.py `
            --source-dir rustdesk `
            --host "$env:CUSTOM_RENDEZVOUS_SERVER" `
            --relay "$env:CUSTOM_RELAY_SERVER" `
            --api "$env:CUSTOM_API_SERVER" `
            --key "$env:CUSTOM_PUBLIC_KEY" `
            --app-name "$env:CLIENT_NAME" `
            --app-id "$env:CLIENT_IDENTIFIER" `
            --description "$env:CLIENT_DESCRIPTION" `
            --company "$env:CLIENT_COMPANY" `
            --asset-dir branding

      - name: Verify injection on Linux/macOS
        if: matrix.target != 'windows'
        shell: bash
        env:
          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
        run: |
          set -euo pipefail

          grep -R "custom-rendezvous-server" rustdesk/libs/hbb_common/src/config.rs
          grep -R "relay-server" rustdesk/libs/hbb_common/src/config.rs || true
          grep -R "api-server" rustdesk/libs/hbb_common/src/config.rs || true
          grep -R "RENDEZVOUS_SERVERS" rustdesk/libs/hbb_common/src/config.rs
          grep -R "RS_PUB_KEY" rustdesk/libs/hbb_common/src/config.rs

          if [ -n "$CLIENT_NAME" ]; then
            grep -R "$CLIENT_NAME" \
              rustdesk/Cargo.toml \
              rustdesk/libs/hbb_common/src/config.rs \
              rustdesk/res/rustdesk.desktop \
              rustdesk/res/rustdesk-link.desktop || true
          fi

          ls -la rustdesk/res/icon.ico rustdesk/res/icon.png rustdesk/res/logo.svg || true

      - name: Verify injection on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        env:
          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
        run: |
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "custom-rendezvous-server"
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "relay-server" -ErrorAction SilentlyContinue
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "api-server" -ErrorAction SilentlyContinue
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "RENDEZVOUS_SERVERS"
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "RS_PUB_KEY"

          if ("$env:CLIENT_NAME" -ne "") {
            Select-String `
              -Path rustdesk/Cargo.toml,rustdesk/libs/hbb_common/src/config.rs,rustdesk/res/rustdesk.desktop,rustdesk/res/rustdesk-link.desktop `
              -Pattern "$env:CLIENT_NAME" `
              -ErrorAction SilentlyContinue
          }

          Get-Item rustdesk/res/icon.ico,rustdesk/res/icon.png,rustdesk/res/logo.svg -ErrorAction SilentlyContinue

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            zip \
            git \
            curl \
            wget \
            ca-certificates \
            build-essential \
            g++ \
            gcc \
            pkg-config \
            cmake \
            make \
            ninja-build \
            clang \
            llvm-dev \
            libclang-dev \
            nasm \
            yasm \
            python3 \
            python3-pip \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            libva-dev \
            libunwind-dev

      - name: Install macOS dependencies
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          brew update
          brew install llvm create-dmg opus yasm

          if ! command -v pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

          # RustDesk official workflow avoids Homebrew NASM 3.x and installs NASM 2.16.03 manually.
          curl -L -o nasm-2.16.03-macosx.zip \
            https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip

          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

          brew --prefix opus

      - name: Install Rust packaging tools
        shell: bash
        run: |
          set -euo pipefail

          if ! cargo bundle --version >/dev/null 2>&1; then
            cargo install cargo-bundle --locked
          fi

      - name: Build Linux
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd rustdesk
          cargo build --lib --features hwcodec,flutter,unix-file-copy-paste --release
          python3 ./build.py --flutter --skip-cargo

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          cd rustdesk
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: Build macOS
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          cd rustdesk
          ./build.py --flutter --hwcodec --unix-file-copy-paste

      - name: Collect Linux/macOS artifacts
        if: matrix.target != 'windows'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          find rustdesk -type f \( \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.dmg" -o \
            -name "*.pkg" -o \
            -name "*.zip" \
          \) -exec cp {} artifacts/ \; || true

          ls -la artifacts || true

      - name: Collect Windows artifacts
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          Get-ChildItem -Path rustdesk -Recurse -File `
            -Include *.exe,*.msi,*.zip `
            | ForEach-Object {
                Copy-Item $_.FullName -Destination artifacts -Force
              }

          Get-ChildItem artifacts -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: warn