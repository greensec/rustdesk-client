  android:
    needs: generate_bridge
    if: ${{ inputs.build_android }}
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-22.04"]' || '["self-hosted", "linux", "x64"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.use_github_runners }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: android

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: android
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install Android build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc-multilib \
            git \
            g++ \
            g++-multilib \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libc6-dev \
            libclang-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libpam0g-dev \
            libpulse-dev \
            libva-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            llvm-dev \
            nasm \
            ninja-build \
            openjdk-17-jdk-headless \
            pkg-config \
            tree \
            wget

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: android
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: android
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: android
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Android native dependencies
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail

          # vcpkg manifest mode removes packages from other triplets when
          # installing a new triplet, so install each to a separate root
          # and merge afterward.
          rm -rf "$VCPKG_ROOT/installed"

          for abi in arm64-v8a armeabi-v7a x86_64; do
            case "$abi" in
              arm64-v8a)   VCPKG_TARGET=arm64-android ;;
              armeabi-v7a) VCPKG_TARGET=arm-neon-android ;;
              x86_64)      VCPKG_TARGET=x64-android ;;
            esac

            echo "=== Building deps for $abi ($VCPKG_TARGET) ==="
            INSTALL_ROOT="$VCPKG_ROOT/installed-$VCPKG_TARGET"
            mkdir -p "$INSTALL_ROOT"
            "$VCPKG_ROOT/vcpkg" install \
              --triplet "$VCPKG_TARGET" \
              --x-install-root="$INSTALL_ROOT" \
              --x-manifest-root="$GITHUB_WORKSPACE/rustdesk" \
              || {
                find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
                  echo "$_1:"
                  echo "======"
                  cat "$_1"
                  echo "======"
                  echo ""
                done
                exit 1
              }
          done

          # Merge per-triplet installs into the standard location
          mkdir -p "$VCPKG_ROOT/installed"
          for triplet in arm64-android arm-neon-android x64-android; do
            if [ -d "$VCPKG_ROOT/installed-$triplet/$triplet" ]; then
              cp -a "$VCPKG_ROOT/installed-$triplet/$triplet" "$VCPKG_ROOT/installed/"
            fi
          done

          # Rename arm-neon-android to arm-android expected by some build scripts
          if [ -d "$VCPKG_ROOT/installed/arm-neon-android" ]; then
            mv "$VCPKG_ROOT/installed/arm-neon-android" "$VCPKG_ROOT/installed/arm-android"
          fi

          echo "=== Installed vcpkg packages ==="
          find "$VCPKG_ROOT/installed" -maxdepth 2 -type d | sort

          echo "=== Checking for expected headers ==="
          for triplet in arm64-android arm-android x64-android; do
            echo "--- $triplet ---"
            ls -la "$VCPKG_ROOT/installed/$triplet/include/" 2>/dev/null || echo "No include dir"
            ls -la "$VCPKG_ROOT/installed/$triplet/lib/" 2>/dev/null || echo "No lib dir"
          done

      - name: Build RustDesk Android libraries
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail

          cd rustdesk

          cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked

          cargo ndk --platform 21 --target aarch64-linux-android build --release --features flutter
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

          cargo ndk --platform 21 --target armv7-linux-androideabi build --release --features flutter
          mkdir -p ./flutter/android/app/src/main/jniLibs/armeabi-v7a
          cp ./target/armv7-linux-androideabi/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so

          cargo ndk --platform 21 --target x86_64-linux-android build --release --features flutter
          mkdir -p ./flutter/android/app/src/main/jniLibs/x86_64
          cp ./target/x86_64-linux-android/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/x86_64/librustdesk.so

          # Copy libc++_shared.so for each ABI. NDK layout can vary, so
          # resolve it instead of assuming one exact path.
          copy_libcxx_shared() {
            local triple="$1"
            local abi="$2"
            local base="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${triple}"
            local lib

            lib="$(find "$base" -maxdepth 2 -type f -name 'libc++_shared.so' | sort -V | head -n 1)"
            if [ -z "$lib" ]; then
              echo "libc++_shared.so not found for ${triple} under ${base}" >&2
              exit 1
            fi

            cp "$lib" "./flutter/android/app/src/main/jniLibs/${abi}/"
          }

          copy_libcxx_shared aarch64-linux-android arm64-v8a
          copy_libcxx_shared arm-linux-androideabi armeabi-v7a
          copy_libcxx_shared x86_64-linux-android x86_64

      - name: Build Flutter APK
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -euo pipefail

          export PATH="/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH"

          cd rustdesk/flutter

          # Increase Gradle JVM memory for CI builds
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./android/gradle.properties
          # Use debug signing config (no release keystore in CI)
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./android/app/build.gradle

          flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: android

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android
          path: artifacts/
          if-no-files-found: error

  publish_release:
    needs:
      - linux
      - linux_appimage
      - linux_flatpak
      - windows
      - macos_x64
      - macos_arm64
      - android
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-latest"]' || '["self-hosted", "linux", "x64"]') }}
    if: ${{ always() && !cancelled() && inputs.publish_release && (!inputs.build_linux || (needs.linux.result == 'success' && needs.linux_appimage.result == 'success' && needs.linux_flatpak.result == 'success')) && (!inputs.build_windows || needs.windows.result == 'success') && (!inputs.build_macos_x64 || needs.macos_x64.result == 'success') && (!inputs.build_macos_arm64 || needs.macos_arm64.result == 'success') && (!inputs.build_android || needs.android.result == 'success') }}
    outputs:
      tag: ${{ steps.stage_release_assets.outputs.tag }}
      title: ${{ steps.stage_release_assets.outputs.title }}
      prerelease: ${{ steps.stage_release_assets.outputs.prerelease }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rustdesk-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Stage release assets
        id: stage_release_assets
        shell: bash
        env:
          INPUT_RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          BUILD_LINUX: ${{ inputs.build_linux }}
          BUILD_WINDOWS: ${{ inputs.build_windows }}
          BUILD_MACOS_X64: ${{ inputs.build_macos_x64 }}
          BUILD_MACOS_ARM64: ${{ inputs.build_macos_arm64 }}
          BUILD_ANDROID: ${{ inputs.build_android }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          asset_ref="$INPUT_RUSTDESK_REF"
          if [[ "$asset_ref" =~ ^v[0-9] ]]; then
            asset_ref="${asset_ref#v}"
          fi
          safe_ref="$(printf '%s' "$asset_ref" | sed 's#[^A-Za-z0-9._-]#-#g')"

          normalized_release_asset_name() {
            local file="$1"
            local artifact_name="$2"
            local base lower ext arch abi

            base="$(basename "$file")"
            lower="$(printf '%s' "$base" | tr '[:upper:]' '[:lower:]')"

            if [[ "$lower" == *.tar.gz ]]; then
              ext=".tar.gz"
            elif [[ "$lower" == *.appimage ]]; then
              ext=".AppImage"
            else
              ext=".${base##*.}"
            fi

            case "$lower" in
              *.deb)
                echo "rustdesk-client-${safe_ref}-linux-x86_64.deb"
                return 0
                ;;
              *.appimage)
                echo "rustdesk-client-${safe_ref}-linux-x86_64.AppImage"
                return 0
                ;;
              *.flatpak)
                echo "rustdesk-client-${safe_ref}-linux-x86_64.flatpak"
                return 0
                ;;
              *.rpm)
                if [[ "$lower" == *suse* ]]; then
                  echo "rustdesk-client-${safe_ref}-linux-x86_64-suse.rpm"
                else
                  echo "rustdesk-client-${safe_ref}-linux-x86_64.rpm"
                fi
                return 0
                ;;
              *.msi)
                echo "rustdesk-client-${safe_ref}-windows-x86_64.msi"
                return 0
                ;;
              *.exe)
                echo "rustdesk-client-${safe_ref}-windows-x86_64.exe"
                return 0
                ;;
              *.apk)
                if [[ "$lower" == *arm64-v8a* ]]; then
                  abi="arm64-v8a"
                elif [[ "$lower" == *armeabi-v7a* ]]; then
                  abi="armeabi-v7a"
                elif [[ "$lower" == *x86_64* ]]; then
                  abi="x86_64"
                elif [[ "$lower" == *x86* ]]; then
                  abi="x86"
                else
                  abi="universal"
                fi
                echo "rustdesk-client-${safe_ref}-android-${abi}.apk"
                return 0
                ;;
            esac

            if [[ "$artifact_name" == *macos* || "$lower" == *macos* || "$lower" == *.dmg || "$lower" == *.pkg ]]; then
              if [[ "$artifact_name" == *arm64* || "$lower" == *arm64* || "$lower" == *aarch64* ]]; then
                arch="arm64"
              elif [[ "$artifact_name" == *x64* || "$artifact_name" == *x86_64* || "$lower" == *x86_64* ]]; then
                arch="x86_64"
              else
                arch="universal"
              fi
              echo "rustdesk-client-${safe_ref}-macos-${arch}${ext}"
              return 0
            fi

            if [[ "$artifact_name" == *windows* && "$lower" == *.zip ]]; then
              echo "rustdesk-client-${safe_ref}-windows-x86_64.zip"
              return 0
            fi

            if [[ "$artifact_name" == *linux* && ( "$lower" == *.zip || "$lower" == *.tar.gz ) ]]; then
              echo "rustdesk-client-${safe_ref}-linux-x86_64${ext}"
              return 0
            fi

            # Fallback for unexpected artifact types: keep a deterministic,
            # sanitized name while still applying the rustdesk-client prefix.
            safe_artifact_name="$(printf '%s' "$artifact_name" | sed 's#[^A-Za-z0-9._-]#-#g')"
            safe_base="$(printf '%s' "$base" | sed 's#[^A-Za-z0-9._-]#-#g')"
            printf 'rustdesk-client-%s-%s-%s' "$safe_ref" "$safe_artifact_name" "$safe_base"
          }

          dedupe_release_asset_path() {
            local path="$1"
            local stem ext n

            if [[ "$path" == *.tar.gz ]]; then
              stem="${path%.tar.gz}"
              ext=".tar.gz"
            else
              stem="${path%.*}"
              ext=".${path##*.}"
            fi

            n=2
            while [ -e "$path" ]; do
              path="${stem}-${n}${ext}"
              n=$((n + 1))
            done

            echo "$path"
          }

          while IFS= read -r -d '' file; do
            artifact_name="$(basename "$(dirname "$file")")"
            asset_name="$(normalized_release_asset_name "$file" "$artifact_name")"
            dest="$(dedupe_release_asset_path "release-assets/${asset_name}")"
            cp "$file" "$dest"
          done < <(find downloaded-artifacts -type f -print0 | sort -z)

          asset_count="$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" -eq 0 ]; then
            echo "No release assets were downloaded from build jobs." >&2
            exit 1
          fi

          release_tag="$INPUT_RELEASE_TAG"
          if [ -z "$release_tag" ]; then
            release_tag="rustdesk-client-${safe_ref}-${GITHUB_RUN_NUMBER}"
          fi

          if ! git check-ref-format "refs/tags/${release_tag}"; then
            echo "Invalid release tag: ${release_tag}" >&2
            exit 1
          fi

          release_title="RustDesk client ${INPUT_RUSTDESK_REF} build ${GITHUB_RUN_NUMBER}"

          os_parts=()
          [ "$BUILD_LINUX" = "true" ] && os_parts+=("Linux")
          [ "$BUILD_WINDOWS" = "true" ] && os_parts+=("Windows")
          [ "$BUILD_MACOS_X64" = "true" ] && os_parts+=("macOS (x64)")
          [ "$BUILD_MACOS_ARM64" = "true" ] && os_parts+=("macOS (ARM64)")
          [ "$BUILD_ANDROID" = "true" ] && os_parts+=("Android")

          if [ ${#os_parts[@]} -eq 0 ]; then
            os_text="No platforms were selected for this build."
          elif [ ${#os_parts[@]} -eq 1 ]; then
            os_text="Assets are generated for ${os_parts[0]}."
          elif [ ${#os_parts[@]} -eq 2 ]; then
            os_text="Assets are generated for ${os_parts[0]} and ${os_parts[1]}."
          else
            formatted=""
            for ((i=0; i<${#os_parts[@]}-1; i++)); do
              formatted="${formatted}${os_parts[i]}, "
            done
            formatted="${formatted}and ${os_parts[-1]}."
            os_text="Assets are generated for ${formatted}"
          fi

          cat > release-notes.md <<EOF
          Automated RustDesk client build.

          - RustDesk ref: \`${INPUT_RUSTDESK_REF}\`
          - Builder commit: \`${GITHUB_SHA}\`
          - Workflow run: \`${GITHUB_RUN_ID}\`

          ${os_text}
          EOF

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "title=${release_title}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${INPUT_PRERELEASE}" >> "$GITHUB_OUTPUT"

          echo "Release assets staged:"
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.stage_release_assets.outputs.tag }}
          RELEASE_TITLE: ${{ steps.stage_release_assets.outputs.title }}
          RELEASE_PRERELEASE: ${{ steps.stage_release_assets.outputs.prerelease }}
        run: |
          set -euo pipefail

          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)

          prerelease_args=()
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
  update_pages:
    needs: publish_release
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_release }}
    permissions:
      contents: write
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Generate docs data files
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.publish_release.outputs.tag }}
          RELEASE_TITLE: ${{ needs.publish_release.outputs.title }}
          RELEASE_PRERELEASE: ${{ needs.publish_release.outputs.prerelease }}
          RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          API_SERVER: ${{ secrets.API_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
        run: |
          set -euo pipefail
          python3 scripts/generate_docs_data.py

      - name: Commit and push updated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update release and config data"
          file_pattern: "docs/_data/*.yml"
          branch: ${{ github.ref_name }}
