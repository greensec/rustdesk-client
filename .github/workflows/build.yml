name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "1.4.6"
      publish_release:
        description: "Create or update a GitHub Release with the built packages"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "GitHub Release tag to create (empty = rustdesk-client-<rustdesk_ref>-<run_number>)"
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false
      use_github_runners:
        description: "Use GitHub-hosted runners instead of self-hosted runners"
        required: true
        type: boolean
        default: true
      build_linux:
        description: "Build Linux packages"
        required: true
        type: boolean
        default: true
      build_windows:
        description: "Build Windows packages"
        required: true
        type: boolean
        default: true
      build_macos_x64:
        description: "Build macOS x64 (Intel) package"
        required: true
        type: boolean
        default: true
      build_macos_arm64:
        description: "Build macOS ARM64 (Apple Silicon) package"
        required: true
        type: boolean
        default: true
      build_android:
        description: "Build Android packages"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75.0"
  MAC_RUST_VERSION: "1.81.0"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  BRIDGE_FLUTTER_VERSION: "3.22.3"
  NDK_VERSION: "r28c"
  CARGO_NDK_VERSION: "3.1.2"

jobs:

  generate_bridge:
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-22.04"]' || '["self-hosted", "linux", "x64", "portainer-vps"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Compute bridge cache key
        id: bridge_key
        shell: bash
        env:
          RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
        run: |
          set -euo pipefail

          # Resolve tags/branches to a commit SHA for a stable cache key
          resolved_ref="$RUSTDESK_REF"
          if git ls-remote --exit-code https://github.com/rustdesk/rustdesk.git "$RUSTDESK_REF" >/dev/null 2>&1; then
            resolved_ref="$(git ls-remote https://github.com/rustdesk/rustdesk.git "$RUSTDESK_REF" | awk '{print $1}')"
          fi

          safe_ref="$(printf '%s' "$resolved_ref" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "key=bridge-${safe_ref}-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-${{ env.CARGO_EXPAND_VERSION }}-${{ env.RUST_VERSION }}-${{ env.BRIDGE_FLUTTER_VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Restore generated bridge cache
        id: bridge_cache
        uses: actions/cache@v4
        with:
          path: bridge-artifact/
          key: ${{ steps.bridge_key.outputs.key }}

      - name: Checkout RustDesk source
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
        run: |
          set -euo pipefail

          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
          cd rustdesk
          git checkout "$RUSTDESK_REF"
          git submodule update --init --recursive

      - name: Install bridge build dependencies
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            clang \
            cmake \
            curl \
            gcc \
            g++ \
            git \
            libclang-dev \
            libgtk-3-dev \
            llvm-dev \
            nasm \
            ninja-build \
            pkg-config \
            wget

      - name: Install rustup if missing
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Rust for bridge generation
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal --component rustfmt
          rustup default "${{ env.RUST_VERSION }}"

      - name: Setup Flutter for bridge generation
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true

      - name: Mark Flutter directory as safe for git
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          git config --global --add safe.directory "$FLUTTER_ROOT"

      - name: Generate Flutter/Rust bridge
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd rustdesk
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked

          pushd flutter
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get
          popd

          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

          test -f ./src/bridge_generated.rs
          test -f ./src/bridge_generated.io.rs
          test -f ./flutter/lib/generated_bridge.dart

      - name: Stage bridge files
        if: steps.bridge_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            bridge-artifact/src \
            bridge-artifact/flutter/lib \
            bridge-artifact/flutter/macos/Runner \
            bridge-artifact/flutter/ios/Runner

          cp rustdesk/src/bridge_generated.rs bridge-artifact/src/
          cp rustdesk/src/bridge_generated.io.rs bridge-artifact/src/
          cp rustdesk/flutter/lib/generated_bridge.dart bridge-artifact/flutter/lib/
          cp rustdesk/flutter/lib/generated_bridge.freezed.dart bridge-artifact/flutter/lib/
          cp rustdesk/flutter/macos/Runner/bridge_generated.h bridge-artifact/flutter/macos/Runner/
          cp rustdesk/flutter/ios/Runner/bridge_generated.h bridge-artifact/flutter/ios/Runner/

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: bridge-artifact/

  linux:
    needs: generate_bridge
    if: ${{ inputs.build_linux }}
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-22.04"]' || '["self-hosted", "linux", "x64"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.use_github_runners }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: linux
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            zip \
            unzip \
            git \
            curl \
            wget \
            ca-certificates \
            build-essential \
            g++ \
            gcc \
            pkg-config \
            cmake \
            make \
            ninja-build \
            clang \
            llvm-dev \
            libclang-dev \
            nasm \
            yasm \
            autoconf \
            libtool \
            python3 \
            python3-pip \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            libva-dev \
            libunwind-dev \
            rpm

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: linux
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: linux
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Mark Flutter directory as safe for git
        shell: bash
        run: |
          set -euo pipefail

          FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          git config --global --add safe.directory "$FLUTTER_ROOT"

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: linux
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Linux DEB
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euo pipefail

          cd rustdesk

          cargo build \
            --lib \
            --features hwcodec,flutter,unix-file-copy-paste \
            --release

          python3 ./build.py --flutter --skip-cargo

      - name: Build Linux RPM packages
        shell: bash
        run: |
          set -euo pipefail

          cd rustdesk
          rm -rf "$HOME/rpmbuild" rpm-output
          mkdir -p rpm-output

          echo "Building Fedora/RHEL RPM package"
          HBB="$PWD" rpmbuild ./res/rpm-flutter.spec -bb
          find "$HOME/rpmbuild/RPMS" -type f -name "rustdesk*.rpm" \
            -exec cp {} rpm-output/ \;

          rm -rf "$HOME/rpmbuild"

          echo "Building SUSE RPM package"
          HBB="$PWD" rpmbuild ./res/rpm-flutter-suse.spec -bb
          find "$HOME/rpmbuild/RPMS" -type f -name "rustdesk*.rpm" | while read -r rpm_file; do
            base="$(basename "${rpm_file%.rpm}")"
            cp "$rpm_file" "rpm-output/${base}-suse.rpm"
          done

          find rpm-output -type f -name "*.rpm" -exec cp {} . \;
          test -n "$(find rpm-output -type f -name '*.rpm' -print -quit)"
          ls -la rpm-output

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux
          path: artifacts/
          if-no-files-found: error

  linux_appimage:
    needs: linux
    if: ${{ inputs.build_linux }}
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-22.04"]' || '["self-hosted", "linux", "x64"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk packaging tree
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-linux
          path: linux-artifacts

      - name: Build AppImage package
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2 fakeroot squashfs-tools zsync python3-pip xz-utils
          python3 -m pip install --user git+https://github.com/rustdesk-org/appimage-builder.git
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          deb_file="$(find linux-artifacts -type f -name '*.deb' | head -n 1)"
          test -n "$deb_file"

          normalize_deb_payload_to_xz() {
            local input_deb="$1"
            local output_deb="$2"
            local workdir
            workdir="$(mktemp -d)"
            trap 'rm -rf "$workdir"' RETURN

            dpkg-deb -R "$input_deb" "$workdir/pkg"
            dpkg-deb -Zxz -b "$workdir/pkg" "$output_deb"
            bsdtar -tf "$output_deb" | grep -qx 'data.tar.xz'
          }

          normalize_deb_payload_to_xz "$deb_file" rustdesk/appimage/rustdesk.deb
          cd rustdesk/appimage
          appimage-builder --skip-tests --recipe ./AppImageBuilder-x86_64.yml
          test -n "$(find . -maxdepth 1 -type f -name '*.AppImage' -print -quit)"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-appimage
          path: rustdesk/appimage/*.AppImage
          if-no-files-found: error

  linux_flatpak:
    needs: linux
    if: ${{ inputs.build_linux }}
    # NOTE: This job requires a privileged Docker container for flatpak/bwrap namespaces.
    # In Portainer, enable "Privileged mode" for the runner container, or add capability SYS_ADMIN.
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["ubuntu-22.04"]' || '["self-hosted", "linux", "x64"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk packaging tree
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-linux
          path: linux-artifacts

      - name: Build Flatpak package
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y git flatpak flatpak-builder libarchive-tools xz-utils fuse3
          sudo modprobe fuse || true
          if [ ! -e /dev/fuse ]; then
            sudo mknod /dev/fuse c 10 229 || true
            sudo chmod 666 /dev/fuse || true
          fi

          deb_file="$(find linux-artifacts -type f -name '*.deb' | head -n 1)"
          test -n "$deb_file"

          normalize_deb_payload_to_xz() {
            local input_deb="$1"
            local output_deb="$2"
            local workdir
            workdir="$(mktemp -d)"
            trap 'rm -rf "$workdir"' RETURN

            dpkg-deb -R "$input_deb" "$workdir/pkg"
            dpkg-deb -Zxz -b "$workdir/pkg" "$output_deb"
            bsdtar -tf "$output_deb" | grep -qx 'data.tar.xz'
          }

          normalize_deb_payload_to_xz "$deb_file" rustdesk/flatpak/rustdesk.deb
          cd rustdesk/flatpak

          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          git clone --depth=1 https://github.com/flathub/shared-modules.git shared-modules || true
          flatpak-builder --user --install-deps-from=flathub -y --force-clean --disable-rofiles-fuse --repo=repo ./build ./rustdesk.json

          version_safe="$(echo '${{ inputs.rustdesk_ref }}' | tr '/ ' '--')"
          flatpak build-bundle ./repo "rustdesk-${version_safe}-x86_64.flatpak" com.rustdesk.RustDesk
          test -n "$(find . -maxdepth 1 -type f -name '*.flatpak' -print -quit)"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-flatpak
          path: rustdesk/flatpak/*.flatpak
          if-no-files-found: error

  windows:
    needs: generate_bridge
    if: ${{ inputs.build_windows }}
    runs-on: ${{ fromJSON(inputs.use_github_runners && '["windows-2022"]' || '["self-hosted", "Windows", "X64"]') }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: windows

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: windows
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install LLVM and Clang on Windows
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: windows
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: windows
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: windows
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Windows
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          cd rustdesk

          python .\build.py `
            --portable `
            --hwcodec `
            --flutter `
            --vram `
            --skip-portable-pack

          $releasePath = "flutter\build\windows\x64\runner\Release"
          if (!(Test-Path $releasePath)) {
            throw "Windows Flutter release directory not found: $releasePath"
          }

          if (Test-Path "rustdesk") {
            Remove-Item -Recurse -Force "rustdesk"
          }
          New-Item -ItemType Directory -Force -Path "rustdesk" | Out-Null
          Copy-Item -Path "$releasePath\*" -Destination "rustdesk" -Recurse -Force

          # Download usbmmidd_v2 and extract into rustdesk
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path "usbmmidd_v2\Win32" -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          Move-Item -Path .\usbmmidd_v2 -Destination .\rustdesk -Force

          # Download printer driver files
          try {
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums

            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1\.4\.zip$').Matches.Groups[1].Value
            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256

            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
              Write-Output "rustdesk_printer_driver_v4-1.4, checksums match, extract the file."
              Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
              New-Item -ItemType Directory -Force -Path .\rustdesk\drivers | Out-Null
              Move-Item -Path .\rustdesk_printer_driver_v4-1.4 -Destination .\rustdesk\drivers\RustDeskPrinterDriver -Force
              Expand-Archive printer_driver_adapter.zip -DestinationPath .
              Move-Item -Path .\printer_driver_adapter.dll -Destination .\rustdesk -Force
            } else {
              Write-Output "rustdesk_printer_driver_v4-1.4 or printer_driver_adapter.dll, checksums do not match, ignore the file."
            }
          } catch {
            Write-Host "Ignore the printer driver error."
          }

      - name: Package Windows portable executable
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          cd rustdesk

          $portableInput = "rustdesk"
          $portableExe = Join-Path $portableInput "rustdesk.exe"
          if (!(Test-Path $portableExe)) {
            throw "rustdesk.exe not found in input directory: $portableInput"
          }

          Push-Location "libs\portable"
          python -m pip install -r requirements.txt
          python .\generate.py `
            -f "..\..\$portableInput\" `
            -o "." `
            -e "..\..\$portableExe"
          Pop-Location

          $packerExe = "target\release\rustdesk-portable-packer.exe"
          if (!(Test-Path $packerExe)) {
            $foundPacker = Get-ChildItem -Path . -Recurse -Filter "rustdesk-portable-packer.exe" |
              Select-Object -First 1
            if ($null -eq $foundPacker) {
              throw "Portable packer executable was not generated"
            }
            $packerExe = $foundPacker.FullName
          }

          $versionSafe = "${{ inputs.rustdesk_ref }}" -replace '[\\/:*?"<>| ]', '-'
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item $packerExe "dist\rustdesk-$versionSafe-windows-x86_64.exe" -Force
          Get-ChildItem "dist"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build MSI
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          cd rustdesk

          Push-Location res\msi
          python preprocess.py --arp -d ..\..\rustdesk --app-name "${{ vars.CLIENT_NAME }}"
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          Pop-Location

          $versionSafe = "${{ inputs.rustdesk_ref }}" -replace '[\\/:*?"<>| ]', '-'
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Move-Item -Path "res\msi\Package\bin\x64\Release\en-us\Package.msi" `
            -Destination "dist\rustdesk-$versionSafe-windows-x86_64.msi" -Force
          Get-ChildItem "dist"

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: artifacts/
          if-no-files-found: error

