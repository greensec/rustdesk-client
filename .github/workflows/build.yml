name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "1.4.6"
      publish_release:
        description: "Create or update a GitHub Release with the built packages"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "GitHub Release tag to create (empty = rustdesk-client-<rustdesk_ref>-<run_number>)"
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false
      build_linux:
        description: "Build Linux packages"
        required: true
        type: boolean
        default: true
      build_windows:
        description: "Build Windows packages"
        required: true
        type: boolean
        default: true
      build_macos:
        description: "Build macOS packages"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75.0"
  MAC_RUST_VERSION: "1.81.0"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  BRIDGE_FLUTTER_VERSION: "3.22.3"

jobs:

  generate_bridge:
    # runs-on: [self-hosted, linux, x64]
    runs-on: [self-hosted, linux, x64, portainer-vps]

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Checkout RustDesk source
        shell: bash
        env:
          RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
        run: |
          set -euo pipefail

          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
          cd rustdesk
          git checkout "$RUSTDESK_REF"
          git submodule update --init --recursive

      - name: Install bridge build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            clang \
            cmake \
            curl \
            gcc \
            g++ \
            git \
            libclang-dev \
            libgtk-3-dev \
            llvm-dev \
            nasm \
            ninja-build \
            pkg-config \
            wget

      - name: Install rustup if missing
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Rust for bridge generation
        shell: bash
        run: |
          set -euo pipefail

          rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal --component rustfmt
          rustup default "${{ env.RUST_VERSION }}"

      - name: Setup Flutter for bridge generation
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.BRIDGE_FLUTTER_VERSION }}
          cache: true

      - name: Mark Flutter directory as safe for git
        shell: bash
        run: |
          set -euo pipefail

          FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          git config --global --add safe.directory "$FLUTTER_ROOT"

      - name: Generate Flutter/Rust bridge
        shell: bash
        run: |
          set -euo pipefail

          cd rustdesk
          cargo install cargo-expand --version "${{ env.CARGO_EXPAND_VERSION }}" --locked
          cargo install flutter_rust_bridge_codegen --version "${{ env.FLUTTER_RUST_BRIDGE_VERSION }}" --features "uuid" --locked

          pushd flutter
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get
          popd

          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

          test -f ./src/bridge_generated.rs
          test -f ./src/bridge_generated.io.rs
          test -f ./flutter/lib/generated_bridge.dart

      - name: Stage bridge files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            bridge-artifact/src \
            bridge-artifact/flutter/lib \
            bridge-artifact/flutter/macos/Runner \
            bridge-artifact/flutter/ios/Runner

          cp rustdesk/src/bridge_generated.rs bridge-artifact/src/
          cp rustdesk/src/bridge_generated.io.rs bridge-artifact/src/
          cp rustdesk/flutter/lib/generated_bridge.dart bridge-artifact/flutter/lib/
          cp rustdesk/flutter/lib/generated_bridge.freezed.dart bridge-artifact/flutter/lib/
          cp rustdesk/flutter/macos/Runner/bridge_generated.h bridge-artifact/flutter/macos/Runner/
          cp rustdesk/flutter/ios/Runner/bridge_generated.h bridge-artifact/flutter/ios/Runner/

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: bridge-artifact/

  linux:
    needs: generate_bridge
    if: ${{ inputs.build_linux }}
    # runs-on: ubuntu-22.04
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: linux
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            zip \
            unzip \
            git \
            curl \
            wget \
            ca-certificates \
            build-essential \
            g++ \
            gcc \
            pkg-config \
            cmake \
            make \
            ninja-build \
            clang \
            llvm-dev \
            libclang-dev \
            nasm \
            yasm \
            autoconf \
            libtool \
            python3 \
            python3-pip \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            libva-dev \
            libunwind-dev \
            rpm

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: linux
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: linux
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: linux
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Linux DEB
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euo pipefail

          cd rustdesk

          cargo build \
            --lib \
            --features hwcodec,flutter,unix-file-copy-paste \
            --release

          python3 ./build.py --flutter --skip-cargo

      - name: Build Linux RPM packages
        shell: bash
        run: |
          set -euo pipefail

          cd rustdesk
          rm -rf "$HOME/rpmbuild" rpm-output
          mkdir -p rpm-output

          echo "Building Fedora/RHEL RPM package"
          HBB="$PWD" rpmbuild ./res/rpm-flutter.spec -bb
          find "$HOME/rpmbuild/RPMS" -type f -name "rustdesk*.rpm" \
            -exec cp {} rpm-output/ \;

          rm -rf "$HOME/rpmbuild"

          echo "Building SUSE RPM package"
          HBB="$PWD" rpmbuild ./res/rpm-flutter-suse.spec -bb
          find "$HOME/rpmbuild/RPMS" -type f -name "rustdesk*.rpm" | while read -r rpm_file; do
            base="$(basename "${rpm_file%.rpm}")"
            cp "$rpm_file" "rpm-output/${base}-suse.rpm"
          done

          find rpm-output -type f -name "*.rpm" -exec cp {} . \;
          test -n "$(find rpm-output -type f -name '*.rpm' -print -quit)"
          ls -la rpm-output

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux
          path: artifacts/
          if-no-files-found: error

  linux_appimage:
    needs: linux
    if: ${{ inputs.build_linux }}
    # runs-on: ubuntu-22.04
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk packaging tree
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-linux
          path: linux-artifacts

      - name: Build AppImage package
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y libarchive-tools libfuse2 python3-pip xz-utils
          python3 -m pip install --user git+https://github.com/rustdesk-org/appimage-builder.git
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          deb_file="$(find linux-artifacts -type f -name '*.deb' | head -n 1)"
          test -n "$deb_file"

          normalize_deb_payload_to_xz() {
            local input_deb="$1"
            local output_deb="$2"
            local workdir
            workdir="$(mktemp -d)"
            trap 'rm -rf "$workdir"' RETURN

            dpkg-deb -R "$input_deb" "$workdir/pkg"
            dpkg-deb -Zxz -b "$workdir/pkg" "$output_deb"
            bsdtar -tf "$output_deb" | grep -qx 'data.tar.xz'
          }

          normalize_deb_payload_to_xz "$deb_file" rustdesk/appimage/rustdesk.deb
          cd rustdesk/appimage
          appimage-builder --skip-tests --recipe ./AppImageBuilder-x86_64.yml
          test -n "$(find . -maxdepth 1 -type f -name '*.AppImage' -print -quit)"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-appimage
          path: rustdesk/appimage/*.AppImage
          if-no-files-found: error

  linux_flatpak:
    needs: linux
    if: ${{ inputs.build_linux }}
    # runs-on: ubuntu-22.04
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk packaging tree
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-linux
          path: linux-artifacts

      - name: Build Flatpak package
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y git flatpak flatpak-builder libarchive-tools xz-utils

          deb_file="$(find linux-artifacts -type f -name '*.deb' | head -n 1)"
          test -n "$deb_file"

          normalize_deb_payload_to_xz() {
            local input_deb="$1"
            local output_deb="$2"
            local workdir
            workdir="$(mktemp -d)"
            trap 'rm -rf "$workdir"' RETURN

            dpkg-deb -R "$input_deb" "$workdir/pkg"
            dpkg-deb -Zxz -b "$workdir/pkg" "$output_deb"
            bsdtar -tf "$output_deb" | grep -qx 'data.tar.xz'
          }

          normalize_deb_payload_to_xz "$deb_file" rustdesk/flatpak/rustdesk.deb
          cd rustdesk/flatpak

          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          git clone --depth=1 https://github.com/flathub/shared-modules.git shared-modules || true
          flatpak-builder --user --install-deps-from=flathub -y --force-clean --repo=repo ./build ./rustdesk.json

          version_safe="$(echo '${{ inputs.rustdesk_ref }}' | tr '/ ' '--')"
          flatpak build-bundle ./repo "rustdesk-${version_safe}-x86_64.flatpak" com.rustdesk.RustDesk
          test -n "$(find . -maxdepth 1 -type f -name '*.flatpak' -print -quit)"

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-flatpak
          path: rustdesk/flatpak/*.flatpak
          if-no-files-found: error

  windows:
    needs: generate_bridge
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: windows

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: windows
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install LLVM and Clang on Windows
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: windows
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: windows
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: windows
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cd rustdesk

          python .\build.py `
            --portable `
            --hwcodec `
            --flutter `
            --vram `
            --skip-portable-pack

      - name: Package Windows portable executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cd rustdesk

          $releasePath = "flutter\build\windows\x64\runner\Release"
          if (!(Test-Path $releasePath)) {
            throw "Windows Flutter release directory not found: $releasePath"
          }

          $portableInput = "rustdesk"
          if (Test-Path $portableInput) {
            Remove-Item -Recurse -Force $portableInput
          }
          New-Item -ItemType Directory -Force -Path $portableInput | Out-Null
          Copy-Item -Path "$releasePath\*" -Destination $portableInput -Recurse -Force

          $portableExe = Join-Path $portableInput "rustdesk.exe"
          if (!(Test-Path $portableExe)) {
            throw "rustdesk.exe not found in portable input directory: $portableInput"
          }

          Push-Location "libs\portable"
          python -m pip install -r requirements.txt
          python .\generate.py `
            -f "..\..\$portableInput\" `
            -o "." `
            -e "..\..\$portableExe"
          Pop-Location

          $packerExe = "target\release\rustdesk-portable-packer.exe"
          if (!(Test-Path $packerExe)) {
            $foundPacker = Get-ChildItem -Path . -Recurse -Filter "rustdesk-portable-packer.exe" |
              Select-Object -First 1
            if ($null -eq $foundPacker) {
              throw "Portable packer executable was not generated"
            }
            $packerExe = $foundPacker.FullName
          }

          $versionSafe = "${{ inputs.rustdesk_ref }}" -replace '[\\/:*?"<>| ]', '-'
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item $packerExe "dist\rustdesk-$versionSafe-windows-x86_64-portable.exe" -Force
          Get-ChildItem "dist"

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: artifacts/
          if-no-files-found: error

  macos:
    needs: generate_bridge
    if: ${{ inputs.build_macos }}
    runs-on: macos-14

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ env.MAC_RUST_VERSION }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: macos

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: macos
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install macOS dependencies
        shell: bash
        run: |
          set -euo pipefail

          brew update
          brew install llvm create-dmg opus yasm pkg-config

          curl -L -o nasm-2.16.03-macosx.zip \
            https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip

          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

          brew --prefix opus

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: macos
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: macos
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Restore generated Flutter/Rust bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk/

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: macos
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build macOS
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euo pipefail

          cd rustdesk

          if [ "$(uname -m)" = "arm64" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj

            python3 ./build.py \
              --flutter \
              --hwcodec \
              --unix-file-copy-paste \
              --screencapturekit
          else
            python3 ./build.py \
              --flutter \
              --hwcodec \
              --unix-file-copy-paste
          fi

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos
          path: artifacts/
          if-no-files-found: error

  publish_release:
    needs:
      - linux
      - linux_appimage
      - linux_flatpak
      - windows
      - macos
    # runs-on: ubuntu-22.04
    runs-on: [self-hosted, linux, x64]
    if: ${{ always() && !cancelled() && inputs.publish_release && (!inputs.build_linux || (needs.linux.result == 'success' && needs.linux_appimage.result == 'success' && needs.linux_flatpak.result == 'success')) && (!inputs.build_windows || needs.windows.result == 'success') && (!inputs.build_macos || needs.macos.result == 'success') }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rustdesk-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Stage release assets
        id: stage_release_assets
        shell: bash
        env:
          INPUT_RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            dest="release-assets/$base"
            if [ -e "$dest" ]; then
              artifact_name="$(basename "$(dirname "$file")")"
              dest="release-assets/${artifact_name}-${base}"
            fi
            cp "$file" "$dest"
          done < <(find downloaded-artifacts -type f -print0 | sort -z)

          asset_count="$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" -eq 0 ]; then
            echo "No release assets were downloaded from build jobs." >&2
            exit 1
          fi

          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )

          release_tag="$INPUT_RELEASE_TAG"
          if [ -z "$release_tag" ]; then
            safe_ref="$(printf '%s' "$INPUT_RUSTDESK_REF" | sed 's#[^A-Za-z0-9._-]#-#g')"
            release_tag="rustdesk-client-${safe_ref}-${GITHUB_RUN_NUMBER}"
          fi

          if ! git check-ref-format "refs/tags/${release_tag}"; then
            echo "Invalid release tag: ${release_tag}" >&2
            exit 1
          fi

          release_title="RustDesk client ${INPUT_RUSTDESK_REF} build ${GITHUB_RUN_NUMBER}"

          cat > release-notes.md <<EOF
          Automated RustDesk client build.

          - RustDesk ref: \`${INPUT_RUSTDESK_REF}\`
          - Builder commit: \`${GITHUB_SHA}\`
          - Workflow run: \`${GITHUB_RUN_ID}\`

          Assets are generated by the workflow jobs and include the available Linux, Windows, and macOS packages. Checksums are included in \`SHA256SUMS.txt\`.
          EOF

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "title=${release_title}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${INPUT_PRERELEASE}" >> "$GITHUB_OUTPUT"

          echo "Release assets staged:"
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.stage_release_assets.outputs.tag }}
          RELEASE_TITLE: ${{ steps.stage_release_assets.outputs.title }}
          RELEASE_PRERELEASE: ${{ steps.stage_release_assets.outputs.prerelease }}
        run: |
          set -euo pipefail

          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)

          prerelease_args=()
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi

