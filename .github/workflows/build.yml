name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "master"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
            shell: bash

          - target: windows
            os: windows-latest
            shell: pwsh

          - target: macos
            os: macos-latest
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Checkout RustDesk source
        shell: ${{ matrix.shell }}
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
          cd rustdesk
          git checkout "${{ github.event.inputs.rustdesk_ref }}"
          git submodule update --init --recursive

      - name: Show RustDesk commit
        shell: ${{ matrix.shell }}
        run: |
          cd rustdesk
          git rev-parse HEAD

      # Enable this later after the plain build works.
      # - name: Apply self-hosted config patch
      #   shell: ${{ matrix.shell }}
      #   run: |
      #     cd rustdesk
      #     git apply ../patches/selfhosted-config.patch

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget ca-certificates \
            build-essential pkg-config cmake ninja-build \
            clang libclang-dev nasm yasm \
            python3 python3-pip

      - name: Build Linux
        if: matrix.target == 'linux'
        shell: bash
        run: |
          cd rustdesk
          python3 build.py

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          cd rustdesk
          python3 build.py

      - name: Build macOS
        if: matrix.target == 'macos'
        shell: bash
        run: |
          cd rustdesk
          python3 build.py

      - name: Collect artifacts
        shell: ${{ matrix.shell }}
        continue-on-error: true
        run: |
          mkdir artifacts
          find rustdesk -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.zip" \) -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: warn
