name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "master"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
          - target: windows
            os: windows-latest
          - target: macos
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Checkout RustDesk source
        run: |
          git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
          cd rustdesk
          git checkout "${{ github.event.inputs.rustdesk_ref }}"
          git submodule update --init --recursive

      - name: Show RustDesk commit
        run: |
          cd rustdesk
          git rev-parse HEAD
      - name: Inject self-hosted RustDesk config on Linux/macOS
        if: matrix.target != 'windows'
        run: |
          python3 scripts/configure_rustdesk.py \
            --source-dir rustdesk \
            --host "${{ secrets.RENDEZVOUS_SERVER }}" \
            --relay "${{ secrets.RELAY_SERVER }}" \
            --api "${{ secrets.API_SERVER }}" \
            --key "${{ secrets.RS_PUB_KEY }}"

      - name: Inject self-hosted RustDesk config on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          python scripts/configure_rustdesk.py `
            --source-dir rustdesk `
            --host "${{ secrets.RENDEZVOUS_SERVER }}" `
            --relay "${{ secrets.RELAY_SERVER }}" `
            --api "${{ secrets.API_SERVER }}" `
            --key "${{ secrets.RS_PUB_KEY }}"

      - name: Verify injected config on Linux/macOS
        if: matrix.target != 'windows'
        run: |
          grep -R "${{ secrets.RENDEZVOUS_SERVER }}" rustdesk/libs/hbb_common/src/config.rs

          if [ -n "${{ secrets.API_SERVER }}" ]; then
            grep -R "${{ secrets.API_SERVER }}" rustdesk/libs/hbb_common/src/config.rs || true
          fi

      - name: Verify injected config on Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "${{ secrets.RENDEZVOUS_SERVER }}"

          if ("${{ secrets.API_SERVER }}" -ne "") {
            Select-String -Path rustdesk/libs/hbb_common/src/config.rs -Pattern "${{ secrets.API_SERVER }}" -ErrorAction SilentlyContinue
          }

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget ca-certificates \
            build-essential pkg-config cmake ninja-build \
            clang libclang-dev nasm yasm \
            python3 python3-pip \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb-randr0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev

      - name: Install Rust packaging tools
        run: |
          cargo install cargo-bundle --locked

      - name: Build Linux
        if: matrix.target == 'linux'
        run: |
          cd rustdesk
          python3 build.py

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          cd rustdesk
          python build.py

      - name: Build macOS
        if: matrix.target == 'macos'
        run: |
          cd rustdesk
          python3 build.py

      - name: Collect Linux/macOS artifacts
        if: matrix.target != 'windows'
        run: |
          mkdir -p artifacts
          find rustdesk -type f \( \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.dmg" -o \
            -name "*.pkg" -o \
            -name "*.zip" \
          \) -exec cp {} artifacts/ \; || true

      - name: Collect Windows artifacts
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          Get-ChildItem -Path rustdesk -Recurse -File `
            -Include *.exe,*.msi,*.zip `
            | ForEach-Object {
                Copy-Item $_.FullName -Destination artifacts -Force
              }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: warn