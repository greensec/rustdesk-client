name: Build RustDesk

on:
  workflow_dispatch:
    inputs:
      rustdesk_ref:
        description: "RustDesk tag, branch, or commit to build"
        required: true
        default: "1.4.6"

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75.0"
  MAC_RUST_VERSION: "1.81.0"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: linux

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: linux
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            zip \
            unzip \
            git \
            curl \
            wget \
            ca-certificates \
            build-essential \
            g++ \
            gcc \
            pkg-config \
            cmake \
            make \
            ninja-build \
            clang \
            llvm-dev \
            libclang-dev \
            nasm \
            yasm \
            python3 \
            python3-pip \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libpam0g-dev \
            libva-dev \
            libunwind-dev

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: linux
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: linux
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: linux
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Linux
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euo pipefail

          cd rustdesk

          cargo build \
            --lib \
            --features hwcodec,flutter,unix-file-copy-paste \
            --release

          python3 ./build.py --flutter --skip-cargo

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux
          path: artifacts/
          if-no-files-found: warn

  windows:
    runs-on: windows-2022

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: windows

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: windows
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install LLVM and Clang on Windows
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: windows
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: windows
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: windows
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build Windows
        shell: pwsh
        run: |
          cd rustdesk

          python .\build.py `
            --portable `
            --hwcodec `
            --flutter `
            --vram `
            --skip-portable-pack

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: artifacts/
          if-no-files-found: warn

  macos:
    runs-on: macos-14

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare RustDesk
        uses: ./.github/actions/prepare-rustdesk
        with:
          rustdesk_ref: ${{ inputs.rustdesk_ref }}
          host: ${{ secrets.RENDEZVOUS_SERVER }}
          relay: ${{ secrets.RELAY_SERVER }}
          api: ${{ secrets.API_SERVER }}
          key: ${{ secrets.RS_PUB_KEY }}
          app_name: ${{ vars.CLIENT_NAME }}
          app_id: ${{ vars.CLIENT_IDENTIFIER }}
          description: ${{ vars.CLIENT_DESCRIPTION }}
          company: ${{ vars.CLIENT_COMPANY }}
          asset_dir: branding
          target: macos

      - name: Verify injection
        uses: ./.github/actions/verify-injection
        with:
          target: macos
          client_name: ${{ vars.CLIENT_NAME }}

      - name: Install macOS dependencies
        shell: bash
        run: |
          set -euo pipefail

          brew update
          brew install llvm create-dmg opus yasm pkg-config

          curl -L -o nasm-2.16.03-macosx.zip \
            https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip

          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

          brew --prefix opus

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          target: macos
          rust_version: ${{ env.RUST_VERSION }}
          mac_rust_version: ${{ env.MAC_RUST_VERSION }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          target: macos
          flutter_version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg
        with:
          target: macos
          vcpkg_commit_id: ${{ env.VCPKG_COMMIT_ID }}

      - name: Build macOS
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          set -euo pipefail

          cd rustdesk

          if [ "$(uname -m)" = "arm64" ]; then
            python3 ./build.py \
              --flutter \
              --hwcodec \
              --unix-file-copy-paste \
              --screencapturekit
          else
            python3 ./build.py \
              --flutter \
              --hwcodec \
              --unix-file-copy-paste
          fi

      - name: Collect artifacts
        uses: ./.github/actions/collect-artifacts
        with:
          target: macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos
          path: artifacts/
          if-no-files-found: warn
