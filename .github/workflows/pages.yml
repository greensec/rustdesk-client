name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/generate_docs_data.py'
      - '.github/workflows/pages.yml'
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to highlight'
        required: false
        default: ''
      release_title:
        description: 'Release title'
        required: false
        default: ''
      release_prerelease:
        description: 'Is prerelease'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh docs data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag || (github.event_name == 'release' && github.event.release.tag_name || '') }}
          RELEASE_TITLE: ${{ inputs.release_title || (github.event_name == 'release' && github.event.release.name || '') }}
          RELEASE_PRERELEASE: ${{ inputs.release_prerelease || (github.event_name == 'release' && github.event.release.prerelease || '') }}
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          API_SERVER: ${{ secrets.API_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
          CLIENT_NAME: ${{ vars.CLIENT_NAME }}
          IMPRINT_URL: ${{ vars.IMPRINT_URL }}
        run: python3 scripts/generate_docs_data.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
