name: Setup vcpkg
description: Clone, bootstrap vcpkg and install dependencies

inputs:
  target:
    description: Target platform (linux, windows, macos)
    required: true
  vcpkg_commit_id:
    description: vcpkg commit ID to checkout
    required: true

runs:
  using: composite
  steps:
    - name: Setup vcpkg on Linux/macOS
      if: inputs.target != 'windows'
      shell: bash
      env:
        VCPKG_COMMIT_ID: ${{ inputs.vcpkg_commit_id }}
      run: |
        set -euo pipefail

        git clone https://github.com/microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"
        cd "$GITHUB_WORKSPACE/vcpkg"

        git checkout "$VCPKG_COMMIT_ID"
        ./bootstrap-vcpkg.sh

        echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> "$GITHUB_ENV"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$GITHUB_WORKSPACE/vcpkg-cache" >> "$GITHUB_ENV"

        mkdir -p "$GITHUB_WORKSPACE/vcpkg-cache"

    - name: Setup vcpkg on Windows
      if: inputs.target == 'windows'
      shell: pwsh
      env:
        VCPKG_COMMIT_ID: ${{ inputs.vcpkg_commit_id }}
      run: |
        git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
        cd "$env:GITHUB_WORKSPACE\vcpkg"

        git checkout "$env:VCPKG_COMMIT_ID"
        .\bootstrap-vcpkg.bat

        "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
        "VCPKG_DEFAULT_BINARY_CACHE=$env:GITHUB_WORKSPACE\vcpkg-cache" | Out-File -FilePath $env:GITHUB_ENV -Append

        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\vcpkg-cache" | Out-Null

    - name: Install vcpkg dependencies on Linux
      if: inputs.target == 'linux'
      shell: bash
      env:
        VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
      run: |
        set -euo pipefail

        if ! "$VCPKG_ROOT/vcpkg" install \
          --triplet x64-linux \
          --x-install-root="$VCPKG_ROOT/installed" \
          --x-manifest-root="$GITHUB_WORKSPACE/rustdesk"; then

          find "$VCPKG_ROOT" -name "*.log" -print -exec sh -c 'echo "======"; cat "$1"; echo "======"' sh {} \;
          exit 1
        fi

    - name: Install vcpkg dependencies on macOS
      if: inputs.target == 'macos'
      shell: bash
      run: |
        set -euo pipefail

        if [ "$(uname -m)" = "arm64" ]; then
          VCPKG_TRIPLET="arm64-osx"
        else
          VCPKG_TRIPLET="x64-osx"
        fi

        echo "Using vcpkg triplet: $VCPKG_TRIPLET"

        if ! "$VCPKG_ROOT/vcpkg" install \
          --triplet "$VCPKG_TRIPLET" \
          --x-install-root="$VCPKG_ROOT/installed" \
          --x-manifest-root="$GITHUB_WORKSPACE/rustdesk"; then

          find "$VCPKG_ROOT" -name "*.log" -print -exec sh -c 'echo "======"; cat "$1"; echo "======"' sh {} \;
          exit 1
        fi

    - name: Install vcpkg dependencies on Windows
      if: inputs.target == 'windows'
      shell: pwsh
      env:
        VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
      run: |
        & "$env:VCPKG_ROOT\vcpkg.exe" install `
          --triplet x64-windows-static `
          --x-install-root="$env:VCPKG_ROOT\installed" `
          --x-manifest-root="$env:GITHUB_WORKSPACE\rustdesk"

        if ($LASTEXITCODE -ne 0) {
          Get-ChildItem -Path "$env:VCPKG_ROOT" -Recurse -Filter "*.log" | ForEach-Object {
            Write-Host "====== $($_.FullName)"
            Get-Content $_.FullName
            Write-Host "======"
          }

          exit 1
        }
