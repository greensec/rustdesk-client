name: Collect Artifacts
description: Collect build artifacts into artifacts/ directory

inputs:
  target:
    description: Target platform (linux, windows, macos, android)
    required: true

runs:
  using: composite
  steps:
    - name: Collect Linux artifacts
      if: inputs.target == 'linux'
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p artifacts

        find rustdesk -type f \( \
          -name "*.deb" -o \
          -name "*.rpm" -o \
          -name "*.AppImage" -o \
          -name "*.flatpak" -o \
          -name "*.tar.gz" -o \
          -name "*.zip" \
        \) -exec cp {} artifacts/ \; || true

        ls -la artifacts || true

    - name: Collect macOS artifacts
      if: inputs.target == 'macos'
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p artifacts

        find rustdesk -type f \( \
          -name "*.dmg" -o \
          -name "*.pkg" -o \
          -name "*.zip" \
        \) -exec cp {} artifacts/ \; || true

        # Flutter macOS builds normally leave the app bundle here.
        # RustDesk upstream creates the DMG explicitly from this .app.
        app_path="$(find rustdesk/flutter/build/macos/Build/Products/Release -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -n 1 || true)"
        if [ -n "$app_path" ]; then
          app_name="$(basename "$app_path")"
          app_base="${app_name%.app}"
          arch="$(uname -m)"

          if command -v create-dmg >/dev/null 2>&1; then
            rm -f "artifacts/${app_base}-${arch}.dmg"
            create-dmg \
              --icon "$app_name" 200 190 \
              --hide-extension "$app_name" \
              --window-size 800 400 \
              --app-drop-link 600 185 \
              "artifacts/${app_base}-${arch}.dmg" \
              "$app_path" || true
          fi

          # Fallback: still publish a usable app archive if create-dmg fails.
          if ! ls artifacts/*.dmg >/dev/null 2>&1; then
            ditto -c -k --sequesterRsrc --keepParent \
              "$app_path" \
              "artifacts/${app_base}-${arch}.app.zip"
          fi
        fi

        if [ -d "rustdesk/target/release/bundle/osx" ]; then
          zip -r artifacts/rustdesk-macos-bundle.zip rustdesk/target/release/bundle/osx
        fi

        echo "Collected artifacts:"
        ls -la artifacts
        test "$(find artifacts -type f | wc -l | tr -d ' ')" -gt 0

    - name: Collect Android artifacts
      if: inputs.target == 'android'
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p artifacts

        find rustdesk -type f -name "*.apk" -exec cp {} artifacts/ \; || true

        ls -la artifacts || true
        test "$(find artifacts -type f | wc -l | tr -d ' ')" -gt 0

    - name: Collect Windows artifacts
      if: inputs.target == 'windows'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"

        New-Item -ItemType Directory -Force -Path artifacts | Out-Null

        # Preferred output: RustDesk's portable packer creates a single
        # self-extracting executable in rustdesk\dist. Publish only that
        # file when it exists, so the Windows artifact is not a folder zip.
        if (Test-Path "rustdesk\dist") {
          Get-ChildItem -Path "rustdesk\dist" -File |
            Where-Object { $_.Extension -in ".exe", ".msi", ".zip" } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination artifacts -Force
            }
        }

        if ((Get-ChildItem artifacts -File -ErrorAction SilentlyContinue | Measure-Object).Count -eq 0) {
          if (Test-Path "rustdesk\flutter\build\windows\x64\runner\Release") {
            Compress-Archive `
              -Path "rustdesk\flutter\build\windows\x64\runner\Release\*" `
              -DestinationPath "artifacts\rustdesk-windows-flutter-release.zip" `
              -Force
          }

          if (Test-Path "rustdesk\rustdesk") {
            Compress-Archive `
              -Path "rustdesk\rustdesk\*" `
              -DestinationPath "artifacts\rustdesk-windows-folder.zip" `
              -Force
          }

          Get-ChildItem -Path rustdesk -Recurse -File `
            -Include *.exe,*.msi,*.zip `
            | Where-Object {
                $_.FullName -notlike "*\target\debug\*" -and
                $_.FullName -notlike "*\target\release\build\*" -and
                $_.FullName -notlike "*\vcpkg\*" -and
                $_.FullName -notlike "*\flutter\build\windows\x64\runner\Release\*.exe"
              } `
            | ForEach-Object {
                Copy-Item $_.FullName -Destination artifacts -Force -ErrorAction SilentlyContinue
              }
        }

        Get-ChildItem artifacts -ErrorAction SilentlyContinue
        if ((Get-ChildItem artifacts -File -ErrorAction SilentlyContinue | Measure-Object).Count -eq 0) {
          throw "No Windows artifacts were collected"
        }
