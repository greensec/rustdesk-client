name: Prepare RustDesk
description: Checkout RustDesk source, update submodules, and inject config/branding

inputs:
  rustdesk_ref:
    description: RustDesk tag, branch, or commit to build
    required: true
  host:
    description: Rendezvous server host
    required: true
  relay:
    description: Relay server
    required: false
    default: ""
  api:
    description: API server
    required: false
    default: ""
  key:
    description: Public key
    required: true
  app_name:
    description: Application name
    required: false
    default: ""
  app_id:
    description: Application identifier
    required: false
    default: ""
  description:
    description: Application description
    required: false
    default: ""
  company:
    description: Company name
    required: false
    default: ""
  asset_dir:
    description: Branding asset directory
    required: false
    default: ""
  target:
    description: Target platform (linux, windows, macos, android)
    required: true

runs:
  using: composite
  steps:
    - name: Checkout RustDesk source
      shell: bash
      env:
        RUSTDESK_REF: ${{ inputs.rustdesk_ref }}
      run: |
        set -euo pipefail

        git clone --recursive https://github.com/rustdesk/rustdesk.git rustdesk
        cd rustdesk
        git checkout "$RUSTDESK_REF"
        git submodule update --init --recursive

    - name: Show RustDesk commit
      shell: bash
      run: |
        set -euo pipefail

        cd rustdesk
        git rev-parse HEAD
        git submodule status --recursive

    - name: Inject self-hosted config and branding on Linux/macOS
      if: inputs.target != 'windows'
      shell: bash
      env:
        CUSTOM_RENDEZVOUS_SERVER: ${{ inputs.host }}
        CUSTOM_RELAY_SERVER: ${{ inputs.relay }}
        CUSTOM_API_SERVER: ${{ inputs.api }}
        CUSTOM_PUBLIC_KEY: ${{ inputs.key }}
        CLIENT_NAME: ${{ inputs.app_name }}
        CLIENT_IDENTIFIER: ${{ inputs.app_id }}
        CLIENT_DESCRIPTION: ${{ inputs.description }}
        CLIENT_COMPANY: ${{ inputs.company }}
      run: |
        set -euo pipefail

        args=(
          --source-dir rustdesk
          --host "$CUSTOM_RENDEZVOUS_SERVER"
          --key "$CUSTOM_PUBLIC_KEY"
        )
        [ -n "$CUSTOM_RELAY_SERVER" ] && args+=(--relay "$CUSTOM_RELAY_SERVER")
        [ -n "$CUSTOM_API_SERVER" ] && args+=(--api "$CUSTOM_API_SERVER")
        [ -n "$CLIENT_NAME" ] && args+=(--app-name "$CLIENT_NAME")
        [ -n "$CLIENT_IDENTIFIER" ] && args+=(--app-id "$CLIENT_IDENTIFIER")
        [ -n "$CLIENT_DESCRIPTION" ] && args+=(--description "$CLIENT_DESCRIPTION")
        [ -n "$CLIENT_COMPANY" ] && args+=(--company "$CLIENT_COMPANY")
        [ -n "${{ inputs.asset_dir }}" ] && args+=(--asset-dir "${{ inputs.asset_dir }}")

        python3 scripts/configure_rustdesk.py "${args[@]}"

    - name: Inject self-hosted config and branding on Windows
      if: inputs.target == 'windows'
      shell: powershell
      env:
        CUSTOM_RENDEZVOUS_SERVER: ${{ inputs.host }}
        CUSTOM_RELAY_SERVER: ${{ inputs.relay }}
        CUSTOM_API_SERVER: ${{ inputs.api }}
        CUSTOM_PUBLIC_KEY: ${{ inputs.key }}
        CLIENT_NAME: ${{ inputs.app_name }}
        CLIENT_IDENTIFIER: ${{ inputs.app_id }}
        CLIENT_DESCRIPTION: ${{ inputs.description }}
        CLIENT_COMPANY: ${{ inputs.company }}
      run: |
        $args = @(
          "--source-dir", "rustdesk",
          "--host", "$env:CUSTOM_RENDEZVOUS_SERVER",
          "--key", "$env:CUSTOM_PUBLIC_KEY"
        )
        if ($env:CUSTOM_RELAY_SERVER -ne "") { $args += @("--relay", "$env:CUSTOM_RELAY_SERVER") }
        if ($env:CUSTOM_API_SERVER -ne "") { $args += @("--api", "$env:CUSTOM_API_SERVER") }
        if ($env:CLIENT_NAME -ne "") { $args += @("--app-name", "$env:CLIENT_NAME") }
        if ($env:CLIENT_IDENTIFIER -ne "") { $args += @("--app-id", "$env:CLIENT_IDENTIFIER") }
        if ($env:CLIENT_DESCRIPTION -ne "") { $args += @("--description", "$env:CLIENT_DESCRIPTION") }
        if ($env:CLIENT_COMPANY -ne "") { $args += @("--company", "$env:CLIENT_COMPANY") }
        if ("${{ inputs.asset_dir }}" -ne "") { $args += @("--asset-dir", "${{ inputs.asset_dir }}") }

        python scripts/configure_rustdesk.py @args
