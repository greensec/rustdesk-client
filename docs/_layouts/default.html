<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% assign page_title = page.title | default: site.title %}
  {% assign page_description = page.description | default: site.description %}
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description | escape }}">
  <meta property="og:title" content="{{ page_title | escape }}">
  <meta property="og:description" content="{{ page_description | escape }}">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.25.0/dist/tabler-icons.min.css">
</head>
<body>
  {{ content }}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
